{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 80px auto; padding: 30px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-top: 5px solid #002244;">
    <div style="text-align: center; margin-bottom: 25px;">
        <h2 style="color: #002244; margin: 0;">Assinador-BAMRJ</h2>
        <small style="color: #666;">Sistema de Tramitação e Assinatura</small>
    </div>

    <form action="{{ url_for('main.login') }}" method="POST">
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Usuário:</label>
            <input type="text" name="username" required 
                   style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Senha:</label>
            <input type="password" name="password" required 
                   style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>

        <button type="submit" 
                style="width: 100%; padding: 12px; background: #002244; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1.1em;">
            Entrar no Sistema
        </button>
    </form>
    
    <p style="text-align: center; font-size: 0.8em; color: #888; margin-top: 20px;">
        Acesso restrito a militares e servidores autorizados.
    </p>
</div>
{% endblock %}
