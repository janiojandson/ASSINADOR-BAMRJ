<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Definir Senha Pessoal - BAMRJ</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; border-top: 5px solid #ffcc00; }
        .login-card img { max-width: 100px; margin-bottom: 20px; }
        .login-card h2 { color: #002244; margin-bottom: 5px; }
        .login-card p { color: #666; font-size: 0.9em; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1em; }
        button { width: 100%; padding: 12px; background: #003366; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1.1em; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #002244; }
        .error { color: #dc3545; background: #f8d7da; padding: 10px; border-radius: 4px; margin-bottom: 15px; border: 1px solid #f5c6cb; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Coat_of_arms_of_the_Brazilian_Navy.svg/1200px-Coat_of_arms_of_the_Brazilian_Navy.svg.png" alt="Marinha do Brasil">
        <h2>Bem-vindo(a), {{ user_name }}!</h2>
        <p>Para garantir a sua segurança, crie uma <strong>senha pessoal e intransferível</strong> para o seu primeiro acesso.</p>
        
        {% if error %}
            <div class="error"><b>⚠️ Erro:</b> {{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <input type="password" name="new_password" placeholder="Digite sua Nova Senha" required>
            <input type="password" name="confirm_password" placeholder="Confirme sua Nova Senha" required>
            <button type="submit">Salvar Senha e Entrar 🔒</button>
        </form>
    </div>
</body>
</html>
