{% extends 'base.html' %}

{% block content %}
<div style="display: flex; height: 88vh; gap: 20px;">
    
    <div id="pdf-viewer" style="flex: 2; background: #525659; overflow-y: auto; padding: 20px; border-radius: 8px;">
        <div id="canvas-container">
            </div>
    </div>

    <div style="flex: 1; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column;">
        
        <div style="border-bottom: 2px solid #002244; margin-bottom: 15px; padding-bottom: 10px;">
            <h2 style="margin: 0; color: #002244;">{{ doc.protocol }}</h2>
            <p style="margin: 5px 0; color: #666;"><strong>Assunto:</strong> {{ doc.name }}</p>
        </div>

        <label><strong>📜 Histórico de Observações:</strong></label>
        <div style="flex-grow: 1; height: 250px; overflow-y: auto; background: #f8f9fa; padding: 15px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9em; white-space: pre-wrap; margin-top: 5px; margin-bottom: 20px; font-family: 'Courier New', Courier, monospace;">{{ doc.current_observation or "Nenhuma observação registrada." }}</div>

        <form action="{{ url_for('main.process_action', doc_id=doc.id, action='aprovar') }}" method="POST" id="action-form">
            <label><strong>✍️ Seu Parecer / Despacho:</strong></label>
            <textarea name="new_observation" style="width: 100%; height: 100px; margin-top: 5px; padding: 10px; border-radius: 4px; border: 1px solid #ccc; resize: none;" placeholder="Digite aqui a observação para o próximo nível hierárquico..." required></textarea>
            
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button type="submit" style="flex: 1; background: #28a745; color: white; padding: 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1em;">✅ APROVAR</button>
                
                <button type="submit" name="action_alt" value="rejeitar" 
                        onclick="this.form.action='{{ url_for('main.process_action', doc_id=doc.id, action='rejeitar') }}';" 
                        style="flex: 1; background: #dc3545; color: white; padding: 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1em;">❌ REJEITAR</button>
            </div>
        </form>

        <a href="{{ url_for('main.index') }}" style="display: block; text-align: center; margin-top: 20px; color: #003366; text-decoration: none; font-weight: bold;">⬅ Voltar ao Painel</a>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<script>
    // Configuração inicial do PDF.js
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    // Lista de arquivos vinda do backend
    const urls = [{% for f in doc.files %} "{{ url_for('main.get_pdf', filename=f.filename) }}", {% endfor %}];

    async function loadAllPDFs() {
        const container = document.getElementById('canvas-container');
        
        if (urls.length === 0) {
            container.innerHTML = '<p style="color:white; text-align:center;">Nenhum arquivo anexado a este processo.</p>';
            return;
        }

        for (const url of urls) {
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 1.5 });
                    
                    // Cria o elemento canvas para cada página
                    const canvas = document.createElement('canvas');
                    canvas.className = 'pdf-page';
                    canvas.style.display = 'block';
                    canvas.style.margin = '20px auto';
                    canvas.style.boxShadow = '0 8px 16px rgba(0,0,0,0.5)'; // Estilo de profundidade
                    canvas.style.backgroundColor = 'white';

                    const ctx = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderContext = {
                        canvasContext: ctx,
                        viewport: viewport
                    };

                    // Aguarda a renderização da página terminar antes de carregar a próxima
                    await page.render(renderContext).promise;
                    container.appendChild(canvas);
                }
            } catch (error) {
                console.error("Erro ao carregar PDF: " + url, error);
                const errorDiv = document.createElement('div');
                errorDiv.style.color = '#ff4444';
                errorDiv.style.textAlign = 'center';
                errorDiv.style.padding = '20px';
                errorDiv.innerText = "⚠️ Erro ao renderizar arquivo: " + url.split('/').pop();
                container.appendChild(errorDiv);
            }
        }
    }

    // Inicia a carga
    loadAllPDFs();
</script>

<style>
    /* Estilização da barra de rolagem do leitor para ficar discreta */
    #pdf-viewer::-webkit-scrollbar { width: 8px; }
    #pdf-viewer::-webkit-scrollbar-track { background: #333; }
    #pdf-viewer::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
    #pdf-viewer::-webkit-scrollbar-thumb:hover { background: #aaa; }
    
    .pdf-page {
        max-width: 100%;
        height: auto !important;
    }
</style>
{% endblock %}
